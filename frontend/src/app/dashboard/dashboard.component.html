<div class="container mt-5">
    <div class="card">
        <div class="card-header" style="background-color: #00008b; color: #ffffff;">HR Dashboard</div>
        <div class="card-body">
            <button class="btn btn-primary m-2" (click)="logout()">Logout</button>
            <button class="btn btn-primary m-2" routerLink="/job-description">Job Descriptions</button>
            <button class="btn btn-primary m-2" routerLink="/resume-scanner">Resume Scanner</button>
            <hr>
            <h5>Stats:</h5>
            <ul>
                <li>Active Job Postings: {{ stats.activeJobs }}</li>
                <li>Resumes Scanned: {{ stats.resumesScanned }}</li>
            </ul>
        </div>
    </div>
</div>
