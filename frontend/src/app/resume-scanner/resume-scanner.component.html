<div class="container mt-5">
  <div class="card">
    <div class="card-header" style="background-color: #00008b; color: #ffffff;">Resume Scanner</div>
    <div class="card-body">
      <input type="file" class="form-control mb-2" (change)="onFileSelected($event)" accept=".pdf,.doc,.docx">
      <button class="btn btn-primary" (click)="uploadAndScore()">AI Score</button>
      <div *ngIf="score !== null" class="mt-3">
        AI Score: {{ score }} / 100
      </div>
    </div>
  </div>
</div>
