<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 400px;">
        <div class="card-header text-center" style="background-color: #00008b; color: #ffffff;">HR Login</div>
        <div class="card-body">
            <form>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" [(ngModel)]="username" name="username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" [(ngModel)]="password" name="password">
                </div>
                <button type="button" class="btn btn-primary btn-block" (click)="login()">Login</button>
            </form>
        </div>
    </div>
</div>
